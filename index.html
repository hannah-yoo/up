<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UP — 유해나</title>
  <meta name="description" content="조각 작품 'UP'에 대한 웹 포스터. 지게와 업을 탐구하는 인터랙티브 웹." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+KR:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
  <div class="poster-container">

    <!-- Layer 0: Background color (CSS background) -->

    <!-- Layer 1: 업(業) title — solid black initially, turns to 3D engraved inner shadow on game start -->
    <svg class="bg-title solid" id="bgTitleSvg" viewBox="0 0 700 840" aria-hidden="true">
      <defs>
        <!-- Inset/engraved inner shadow filter -->
        <filter id="inset-shadow" x="-10%" y="-10%" width="120%" height="120%">
          <feOffset dx="2" dy="5"/>
          <feGaussianBlur stdDeviation="4" result="offset-blur"/>
          <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
          <feFlood flood-color="#000000" flood-opacity="0.4" result="color"/>
          <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
          <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
        </filter>
      </defs>
      <text x="350" y="650" text-anchor="middle" id="bgTitleText">業</text>
    </svg>

    <!-- Layer 2: Static decorative assets — always visible below rice paper -->
    <div class="assets-layer" aria-hidden="true" id="assetsLayer">
      <img class="asset paper-strip-1" src="assets/paper strip 1.webp" alt="" />
      <img class="asset flower-red"    src="assets/flower_red.webp"    alt="" />
      <img class="asset flower-yellow" src="assets/flower_yellow.webp" alt="" />
      <img class="asset flower-blue"   src="assets/flower_blue.webp"   alt="" />
      <img class="asset paper-strip-2" src="assets/paper strip 2.webp" alt="" />
    </div>

    <!-- Layer 3: Rice paper cloth simulation canvas (burns away on click) -->
    <canvas id="paperCanvas" aria-label="인터랙티브 한지 컬럼"></canvas>

    <!-- QR Code & Info Header (visible only on print) -->
    <div class="print-header">
      <div class="print-qr-box" id="qrContainer"></div>
      <div class="print-qr-text">
        <div class="print-text-ko">직접 업보 쌓아보기</div>
        <div class="print-text-en">Build your own UP here</div>
      </div>
    </div>

  </div>

  <script src="paper.js"></script>
</body>

</html>
